name: Spring Boot CI Pipeline
# Trigger workflow on push and pull request to main branch
on:
push:
branches: [ main ]
jobs:
build:
runs-on: ubuntu-latest
steps:
# Step 1: Checkout repository code
- name: Checkout code
uses: actions/checkout@v4
# Step 2: Setup JDK for Maven build
- name: Setup JDK
uses: actions/setup-java@v4
with:
java-version: '17'
distribution: 'temurin'
# Step 3: Build and package the project
- name: Build with Maven
run: mvn clean package -DskipTests
# Step 4: Upload the .jar artifact
- name: Upload JAR artifact
uses: actions/upload-artifact@v4
with:
name: springboot-build
path: target/*.jar
